name: Tribbu Mobile Tests

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform"
        required: true
        default: "android"
        type: choice
        options:
          - android
          - ios
      test:
        description: "Test name to run (leave empty for all, e.g. onboarding_test)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  mobile-test:
    name: "Run ${{ inputs.test || 'all tests' }} on ${{ inputs.platform }}"
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python environment
        run: python -m pip install -e ".[dev]" --quiet

      - name: Start Appium server
        run: |
          appium --log appium.log &
          echo $! > appium.pid
          sleep 4

      - name: Run tests
        id: run_tests
        run: |
          EXTRA=""
          if [ -n "${{ inputs.test }}" ]; then
            EXTRA="--test ${{ inputs.test }}"
          fi
          python -m tribbu.generator.cli run \
            --platform "${{ inputs.platform }}" \
            --no-open \
            $EXTRA
        continue-on-error: true

      - name: Stop Appium server
        if: always()
        run: |
          [ -f appium.pid ] && kill $(cat appium.pid) 2>/dev/null || true
          rm -f appium.pid

      - name: Load previous Allure history
        if: always()
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Generate Allure report
        if: always()
        run: |
          mkdir -p allure-history
          # Copy previous history if it exists
          if [ -d gh-pages/history ]; then
            mkdir -p reports/allure-results/history
            cp -r gh-pages/history reports/allure-results/history
          fi
          allure generate reports/allure-results --output allure-history --clean

      - name: Publish report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Upload failure screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ inputs.platform }}-${{ github.run_number }}
          path: reports/screenshots/
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload Appium log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-log-${{ github.run_number }}
          path: appium.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.run_tests.outcome }}" = "success" ]; then
            echo "**Tests passed**" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Tests failed**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Allure report:** https://fhautoma.github.io/tribbu-automation-framework/" >> $GITHUB_STEP_SUMMARY
